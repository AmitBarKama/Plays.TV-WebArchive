<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>memoryTV — recover deleted Plays.tv clips</title>
  <link rel="preconnect" href="https://web.archive.org" />
  <!-- Apply the remembered theme before first paint (no flash-of-wrong-theme). -->
  <script>
    (function () {
      try {
        var pref = localStorage.getItem("mtv-theme") || "auto";
        var sys = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", pref === "auto" ? sys : pref);
        document.documentElement.setAttribute("data-theme-pref", pref);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <div class="brand-mark" id="brand" title="Back to search">memory<span>TV</span></div>

  <div class="top-actions">
    <button class="icon-btn" id="theme-toggle" type="button" aria-label="Toggle dark or light mode"></button>
    <a class="icon-btn" id="github-link" href="https://github.com/AmitBarKama" target="_blank" rel="noopener noreferrer" title="View on GitHub" aria-label="GitHub">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 .5A11.5 11.5 0 0 0 .5 12a11.5 11.5 0 0 0 7.86 10.92c.58.1.79-.25.79-.56v-1.96c-3.2.7-3.88-1.54-3.88-1.54-.53-1.34-1.29-1.7-1.29-1.7-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.2 1.77 1.2 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.55-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.8 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.24 2.76.12 3.05.74.81 1.18 1.84 1.18 3.1 0 4.43-2.69 5.41-5.25 5.69.41.36.78 1.05.78 2.12v3.14c0 .31.21.67.8.56A11.5 11.5 0 0 0 23.5 12 11.5 11.5 0 0 0 12 .5z"/></svg>
    </a>
  </div>

  <header class="hero" id="hero">
    <div class="hero-inner">
      <div class="channel-id" id="channel-id">CH 07 · NO SIGNAL · <span class="blip">▒▒▒▒▒▒▒▒</span></div>
      <p class="prompt">What did they call you back then?</p>

      <div class="search-wrap">
        <div class="answer-line" id="answer-line">
          <input id="search" class="answer" type="text" autocomplete="off" spellcheck="false" placeholder="" />
          <span class="cursor" id="search-cursor"></span>
          <div class="spinner" id="search-spinner" hidden></div>
        </div>
        <ul class="suggestions" id="suggestions" hidden></ul>
        <div class="tune-row">
          <button class="tune-btn" id="search-go" title="Search">◉ Tune in</button>
          <span class="hint">some of it survived.</span>
        </div>
      </div>
    </div>
  </header>

  <main id="results" class="results" hidden></main>

  <!-- Video modal -->
  <div class="modal" id="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <button class="modal-nav prev" id="modal-prev" data-nav="-1" aria-label="Previous clip"><span class="nav-ico">&#8249;</span></button>
    <div class="modal-card">
      <button class="modal-close" data-close aria-label="Close">&times;</button>
      <video id="player" controls playsinline></video>
      <div class="modal-meta">
        <h3 id="modal-title"></h3>
        <span id="modal-badge" class="modal-badge" hidden></span>
        <div class="modal-actions">
          <span id="modal-sub" class="muted"></span>
          <a id="modal-dl" class="btn btn-primary" download>Download .mp4</a>
        </div>
      </div>
      <div class="modal-loading" id="modal-loading">Locating the file in the archive…</div>
    </div>
    <button class="modal-nav next" id="modal-next" data-nav="1" aria-label="Next clip"><span class="nav-ico">&#8250;</span></button>
  </div>

  <!-- Followers / following panel -->
  <div class="conn" id="conn" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="conn-card">
      <button class="modal-close" data-close aria-label="Close">&times;</button>
      <h3 id="conn-title">Followers</h3>
      <div class="conn-list" id="conn-list"></div>
    </div>
  </div>

  <footer class="foot">
    <span>Recovers publicly-archived gameplay clips via the Internet Archive Wayback Machine &amp; ArchiveTeam.</span>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
